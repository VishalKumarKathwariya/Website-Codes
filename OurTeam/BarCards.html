<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team design 3 · wine bar cards</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #121017;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .team-section {
      max-width: 1300px;
      margin: 0 auto;
      width: 100%;
    }
    .section-title {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .section-title h2 {
      color: #f0e3e3;
      font-size: 2.3rem;
      font-weight: 400;
    }
    .section-title p {
      color: #ad828b;
      font-size: 1rem;
    }

    .card-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }
    @media (min-width: 640px) {
      .card-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (min-width: 1024px) {
      .card-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .member-card {
      background: #1c1721;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 30px 40px -20px black;
      transition: all 0.2s;
      border: 1px solid #312936;
    }
    .member-card:hover {
      border-color: #a73f4c;
      transform: scale(1.02);
    }

    .top-bar {
      height: 10px;
      background: linear-gradient(90deg, #5c1a21, #ab384b, #5c1a21);
    }

    .card-content {
      padding: 1.8rem 1.2rem 1.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #3e242c;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    .member-card:hover .avatar {
      border-color: #9d3845;
    }

    h3 {
      color: white;
      font-size: 1.6rem;
      font-weight: 450;
      line-height: 1.2;
    }
    .role {
      color: #d48d8d;
      font-size: 0.9rem;
      text-transform: uppercase;
      margin: 0.4rem 0 0.8rem;
      letter-spacing: 1px;
    }
    .description {
      color: #b3a2b0;
      font-size: 0.9rem;
      line-height: 1.4;
      margin-bottom: 1.3rem;
      max-width: 240px;
    }

    .contact-row {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
    }
    .contact-row a {
      background: #2b2129;
      color: #e7c4c4;
      width: 40px;
      height: 40px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 1.2rem;
      transition: 0.2s;
      border: 1px solid #44343e;
    }
    .contact-row a:hover {
      background: #89232f;
      color: white;
      border-color: #89232f;
    }

    /* wine note */
    .card-content .role {
      color: #dc9e9e;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <section class="team-section">
    <div class="section-title">
      <h2>meet the minds</h2>
      <p>wine bar · dark elegance</p>
    </div>
    <div class="card-grid">
      <div class="member-card">
        <div class="top-bar"></div>
        <div class="card-content">
          <img class="avatar" src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=200&q=80&auto=format&fit=crop" alt="Elena">
          <h3>Elena Vos</h3>
          <div class="role">founder / ceo</div>
          <div class="description">visionary in brand innovation</div>
          <div class="contact-row">
            <a href="#"><i class="fab fa-linkedin-in">L</i></a>
            <a href=""><i class="fas fa-phone-alt">P</i></a>
          </div>
        </div>
      </div>
      <div class="member-card">
        <div class="top-bar"></div>
        <div class="card-content">
          <img class="avatar" src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=200&q=80&auto=format&fit=crop" alt="James">
          <h3>James Carter</h3>
          <div class="role">CTO</div>
          <div class="description">scalable systems & AI</div>
          <div class="contact-row">
            <a href="#"><i class="fab fa-github"></i>G</a>
            <a href="#"><i class="fab fa-linkedin-in">L</i></a>
          </div>
        </div>
      </div>
      <div class="member-card">
        <div class="top-bar"></div>
        <div class="card-content">
          <img class="avatar" src="https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?w=200&q=80&auto=format&fit=crop" alt="Nia">
          <h3>Nia Okonkwo</h3>
          <div class="role">creative lead</div>
          <div class="description">design systems & motion</div>
          <div class="contact-row">
            <a href="#"><i class="fab fa-dribbble">D</i></a>
            <a href="#"><i class="fab fa-x-twitter">T</i></a>
          </div>
        </div>
      </div>
      <div class="member-card">
        <div class="top-bar"></div>
        <div class="card-content">
          <img class="avatar" src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=200&q=80&auto=format&fit=crop" alt="Sven">
          <h3>Sven Larsen</h3>
          <div class="role">strategy</div>
          <div class="description">market expansion & partnerships</div>
          <div class="contact-row">
            <a href="#"><i class="fab fa-linkedin-in">L</i></a>
            <a href="#"><i class="fas fa-envelope">E</i></a>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Design 53 — Login / Authentication Form</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --wine:#8B1A38;--wine-l:#B02347;--wine-xl:#D4365A;--wine-d:#5C0F24;--wine-xd:#3A0818;
  --wine-glow:rgba(139,26,56,.5);--wine-tint:rgba(139,26,56,.14);
  --bg0:#06060C;--bg2:#0F0F18;--bg3:#15151E;--bg4:#1D1D28;--bg5:#252535;
  --chalk:#F2EAF2;--chalk2:#C2B6C4;--chalk3:#867A8C;--chalk4:#4E4660;
  --bdr:rgba(255,255,255,.07);--bdr2:rgba(255,255,255,.12);--bdr-w:rgba(139,26,56,.45);
  --r:14px;--r-lg:20px;--r-xl:28px;--r-2xl:36px;
  --ease:cubic-bezier(.4,0,.2,1);--spring:cubic-bezier(.34,1.56,.64,1);
  --ff-d:'Cormorant Garamond',Georgia,serif;--ff-s:'Syne',sans-serif;--ff-m:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg0);color:var(--chalk);font-family:var(--ff-s);min-height:100dvh;overflow-x:hidden;display:grid;place-items:center;padding:clamp(1rem,4vw,2rem)}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input{font:inherit;color:inherit;border:none;outline:none}

/* Radial bg */
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 60% at 50% 30%,rgba(139,26,56,.1) 0%,transparent 70%)}

/* Card */
.card{width:100%;max-width:420px;background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--r-2xl);overflow:hidden;box-shadow:0 40px 90px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.03);position:relative}

/* Top shine */
.card::before{content:'';display:block;height:1.5px;background:linear-gradient(90deg,transparent,var(--wine),transparent)}

/* Logo area */
.card-logo{display:flex;flex-direction:column;align-items:center;padding:clamp(2rem,5vw,2.8rem) 2rem clamp(1.2rem,3vw,1.6rem);position:relative}
.logo-mark{width:52px;height:52px;border-radius:var(--r);background:linear-gradient(145deg,var(--wine-d),var(--wine));display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px var(--wine-glow);margin-bottom:.9rem}
.logo-name{font-family:var(--ff-d);font-size:1.2rem;font-weight:700;letter-spacing:-.01em}
.logo-tagline{font-size:11px;color:var(--chalk4);font-family:var(--ff-m);margin-top:3px;letter-spacing:.06em}

/* Tab switcher */
.tab-row{display:grid;grid-template-columns:1fr 1fr;gap:0;background:var(--bg4);margin:0 clamp(1.2rem,4vw,1.8rem);border-radius:var(--r-lg);padding:4px;border:1px solid var(--bdr)}
.tab-btn{height:38px;border-radius:var(--r);font-size:13px;font-weight:700;color:var(--chalk3);transition:all .25s var(--ease)}
.tab-btn.active{background:var(--bg3);color:var(--chalk);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.tab-btn.active.wine-tab{background:var(--wine);color:#fff;box-shadow:0 3px 12px var(--wine-glow)}

/* Form body */
.form-body{padding:clamp(1.4rem,4vw,2rem) clamp(1.5rem,4vw,1.8rem) clamp(1.5rem,4vw,2rem)}

.auth-form{display:flex;flex-direction:column;gap:13px;display:none;animation:tabIn .3s var(--ease) both}
.auth-form.active{display:flex}
@keyframes tabIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.fld{display:flex;flex-direction:column;gap:5px;position:relative}
.lbl-row{display:flex;align-items:center;justify-content:space-between}
.lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--chalk3);font-family:var(--ff-m)}
.lbl-link{font-size:11px;color:var(--wine-xl);font-family:var(--ff-m);transition:color .2s}
.lbl-link:hover{color:var(--wine-l)}

/* Input with icon */
.inp-wrap{position:relative}
.inp-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--chalk4);pointer-events:none;transition:color .2s;z-index:1}
.inp-wrap:focus-within .inp-icon{color:var(--wine-xl)}
.ipt{background:var(--bg4);border:1.5px solid var(--bdr);border-radius:var(--r);padding:13px 44px 13px 44px;font-size:14px;transition:all .22s;color:var(--chalk);width:100%}
.ipt:focus{background:var(--bg5);border-color:var(--wine);box-shadow:0 0 0 3px var(--wine-tint)}
.ipt::placeholder{color:var(--chalk4)}
.ipt-no-icon{padding-left:16px}
/* Eye toggle */
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:30px;height:30px;display:flex;align-items:center;justify-content:center;color:var(--chalk4);transition:color .2s;cursor:pointer}
.eye-btn:hover{color:var(--chalk2)}

/* Strength meter */
.strength-bar{height:3px;background:var(--bdr2);border-radius:99px;overflow:hidden;margin-top:4px}
.strength-fill{height:100%;border-radius:99px;transition:all .3s var(--ease);width:0%}
.strength-label{font-size:10px;font-family:var(--ff-m);margin-top:3px}

/* Social logins */
.social-divider{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--chalk4);font-family:var(--ff-m)}
.sd-line{flex:1;height:1px;background:var(--bdr)}
.social-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.soc-btn{display:flex;align-items:center;justify-content:center;gap:8px;height:44px;border-radius:var(--r-lg);background:var(--bg4);border:1.5px solid var(--bdr2);font-size:13px;font-weight:600;color:var(--chalk2);transition:all .2s}
.soc-btn:hover{background:var(--bg5);border-color:var(--bdr2);color:var(--chalk)}

/* Submit */
.auth-btn{width:100%;height:50px;border-radius:var(--r-lg);font-size:14px;font-weight:800;letter-spacing:.04em;background:linear-gradient(135deg,var(--wine-xd),var(--wine) 55%,var(--wine-l));color:#fff;box-shadow:0 5px 22px var(--wine-glow);transition:all .22s;position:relative;overflow:hidden}
.auth-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.14) 0%,transparent 55%);opacity:0;transition:opacity .2s}
.auth-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(139,26,56,.65)}
.auth-btn:hover::after{opacity:1}
.auth-btn.loading{pointer-events:none}
.auth-btn .btn-t{transition:opacity .2s}
.auth-btn.loading .btn-t{opacity:0}
.auth-btn .spnr{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;animation:spin .7s linear infinite;display:none}
.auth-btn.loading .spnr{display:block}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}

/* Terms */
.terms-note{font-size:11px;color:var(--chalk4);text-align:center}
.terms-note a{color:var(--wine-xl);transition:color .2s}
.terms-note a:hover{color:var(--wine-l)}

/* 2FA step */
.tfa-screen{display:none;flex-direction:column;align-items:center;gap:1rem;text-align:center;padding:clamp(1.5rem,4vw,2rem) clamp(1.5rem,4vw,1.8rem);animation:tabIn .3s var(--ease)}
.tfa-screen.active{display:flex}
.tfa-icon{width:56px;height:56px;border-radius:50%;background:var(--wine-tint);border:1.5px solid var(--bdr-w);display:flex;align-items:center;justify-content:center;color:var(--wine-xl)}
.tfa-title{font-family:var(--ff-d);font-size:1.2rem;font-weight:700}
.tfa-sub{font-size:13px;color:var(--chalk3);max-width:30ch}
.otp-row{display:flex;gap:8px;justify-content:center;margin:4px 0}
.otp-box{width:46px;height:54px;background:var(--bg4);border:1.5px solid var(--bdr);border-radius:var(--r);text-align:center;font-size:1.4rem;font-weight:700;font-family:var(--ff-m);color:var(--chalk);transition:all .2s}
.otp-box:focus{border-color:var(--wine);background:var(--bg5);box-shadow:0 0 0 3px var(--wine-tint);outline:none}
.otp-box.filled{border-color:var(--bdr-w);color:var(--wine-xl)}
.verify-btn{width:100%;height:48px;border-radius:var(--r-lg);font-size:14px;font-weight:800;background:linear-gradient(135deg,var(--wine-xd),var(--wine),var(--wine-l));color:#fff;box-shadow:0 4px 18px var(--wine-glow);transition:all .22s}
.verify-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(139,26,56,.65)}
.tfa-back{font-size:12px;color:var(--chalk3);transition:color .2s;cursor:pointer}
.tfa-back:hover{color:var(--chalk2)}

/* Card footer */
.card-footer{border-top:1px solid var(--bdr);padding:.9rem;text-align:center;font-size:12px;color:var(--chalk4);background:var(--bg3)}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg4);border:1px solid var(--bdr-w);padding:11px 20px;border-radius:var(--r);font-size:13px;font-weight:600;z-index:9999;display:flex;align-items:center;gap:8px;box-shadow:0 8px 28px rgba(0,0,0,.6);opacity:0;pointer-events:none;white-space:nowrap;transition:transform .4s var(--spring),opacity .35s;max-width:calc(100vw-2rem)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.t-dot{width:7px;height:7px;border-radius:50%;background:var(--wine-xl);animation:bl 1.4s infinite;flex-shrink:0}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="toast" id="toast"><span class="t-dot"></span><span id="tmsg">Logged in! ✦</span></div>

<div class="card">
  <div class="card-logo">
    <div class="logo-mark">
      <svg width="22" height="22" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    </div>
    <div class="logo-name">Meridian</div>
    <div class="logo-tagline">Design 53 · Authentication</div>
  </div>

  <!-- Tabs -->
  <div class="tab-row">
    <button class="tab-btn active wine-tab" id="tabLogin" onclick="switchTab('login')">Sign In</button>
    <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">Create Account</button>
  </div>

  <div class="form-body">

    <!-- LOGIN form -->
    <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
      <div class="fld">
        <label class="lbl">Email</label>
        <div class="inp-wrap">
          <span class="inp-icon"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
          <input class="ipt" type="email" placeholder="jane@example.com" autocomplete="email" required/>
          <span class="eye-btn"></span>
        </div>
      </div>
      <div class="fld">
        <div class="lbl-row"><label class="lbl">Password</label><a class="lbl-link" href="#">Forgot password?</a></div>
        <div class="inp-wrap">
          <span class="inp-icon"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <input class="ipt" id="loginPw" type="password" placeholder="••••••••" autocomplete="current-password" required/>
          <button title="button" type="button" class="eye-btn" onclick="togglePw('loginPw',this)"><svg id="loginPwIcon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>
      <button class="auth-btn" id="loginBtn" type="submit"><span class="btn-t">Sign In →</span><span class="spnr"></span></button>
      <div class="social-divider"><div class="sd-line"></div>or continue with<div class="sd-line"></div></div>
      <div class="social-btns">
        <button type="button" class="soc-btn" onclick="socialLogin('Google')"><svg width="15" height="15" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>Google</button>
        <button type="button" class="soc-btn" onclick="socialLogin('GitHub')"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/></svg>GitHub</button>
      </div>
    </form>

    <!-- REGISTER form -->
    <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
      <div class="fld">
        <label class="lbl">Full Name</label>
        <div class="inp-wrap">
          <span class="inp-icon"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
          <input class="ipt" type="text" placeholder="Jane Doe" autocomplete="name" required/>
        </div>
      </div>
      <div class="fld">
        <label class="lbl">Email</label>
        <div class="inp-wrap">
          <span class="inp-icon"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
          <input class="ipt" type="email" placeholder="jane@example.com" autocomplete="email" required/>
        </div>
      </div>
      <div class="fld">
        <label class="lbl">Password</label>
        <div class="inp-wrap">
          <span class="inp-icon"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <input class="ipt" id="regPw" type="password" placeholder="Create a strong password" autocomplete="new-password" required oninput="updateStrength(this.value)"/>
          <button type="button" class="eye-btn" onclick="togglePw('regPw',this)"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>
      <button class="auth-btn" id="regBtn" type="submit"><span class="btn-t">Create Account →</span><span class="spnr"></span></button>
      <p class="terms-note">By creating an account you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>
    </form>

    <!-- 2FA step -->
    <div class="tfa-screen" id="tfaScreen">
      <div class="tfa-icon"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg></div>
      <h3 class="tfa-title">Two-factor auth</h3>
      <p class="tfa-sub">We sent a 6-digit code to your email. Enter it below.</p>
      <div class="otp-row">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric"/>
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric"/>
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric"/>
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric"/>
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric"/>
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric"/>
      </div>
      <button class="verify-btn" onclick="verifyTFA()">Verify &amp; Sign In →</button>
      <button class="tfa-back" onclick="backToLogin()">← Back to login</button>
    </div>

  </div>
  <div class="card-footer">Design 53 · Meridian Platform · Secure Login</div>
</div>

<script>
function switchTab(tab){
  const isLogin=tab==='login';
  document.getElementById('tabLogin').classList.toggle('active',isLogin);
  document.getElementById('tabLogin').classList.toggle('wine-tab',isLogin);
  document.getElementById('tabRegister').classList.toggle('active',!isLogin);
  document.getElementById('tabRegister').classList.toggle('wine-tab',!isLogin);
  document.getElementById('loginForm').classList.toggle('active',isLogin);
  document.getElementById('registerForm').classList.toggle('active',!isLogin);
  document.getElementById('tfaScreen').classList.remove('active');
}
function togglePw(id,btn){
  const inp=document.getElementById(id);
  const show=inp.type==='password';
  inp.type=show?'text':'password';
  btn.querySelector('svg').style.opacity=show?'.4':'1';
}
function updateStrength(pw){
  let score=0;
  if(pw.length>=8)score++;
  if(/[A-Z]/.test(pw))score++;
  if(/[0-9]/.test(pw))score++;
  if(/[^A-Za-z0-9]/.test(pw))score++;
  const fill=document.getElementById('strengthFill');
  const label=document.getElementById('strengthLabel');
  const pcts=[0,25,55,80,100];
  const colors=['','#EF4444','#FEBC2E','#22C55E','#22C55E'];
  const labels=['','Weak','Fair','Good','Strong'];
  fill.style.width=pcts[score]+'%';
  fill.style.background=colors[score];
  label.style.color=colors[score];
  label.textContent=score>0?labels[score]+' password':'';
}
function handleLogin(e){
  e.preventDefault();
  const btn=document.getElementById('loginBtn');
  btn.classList.add('loading');
  setTimeout(()=>{
    btn.classList.remove('loading');
    document.getElementById('loginForm').classList.remove('active');
    document.getElementById('tfaScreen').classList.add('active');
  },1000);
}
function handleRegister(e){
  e.preventDefault();
  const btn=document.getElementById('regBtn');
  btn.classList.add('loading');
  setTimeout(()=>{btn.classList.remove('loading');showToast('Account created! Welcome. ✦')},1200);
}
function verifyTFA(){
  showToast('Authentication successful! ✦');
  setTimeout(()=>backToLogin(),1500);
}
function backToLogin(){
  document.getElementById('tfaScreen').classList.remove('active');
  document.getElementById('loginForm').classList.add('active');
}
function socialLogin(p){showToast(`Redirecting to ${p}… ✦`)}
function showToast(msg){const t=document.getElementById('toast');document.getElementById('tmsg').textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}

// OTP box behaviour
document.querySelectorAll('.otp-box').forEach((b,i,all)=>{
  b.addEventListener('input',e=>{
    const v=e.target.value.replace(/\D/,'');e.target.value=v;
    b.classList.toggle('filled',!!v);
    if(v&&i<all.length-1)all[i+1].focus();
  });
  b.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!b.value&&i>0){all[i-1].focus();all[i-1].value='';all[i-1].classList.remove('filled')}});
});
</script>
</body>
</html>

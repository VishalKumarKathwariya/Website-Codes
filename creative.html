<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hero Section</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Lottie Player Web Component -->
  <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f9faf9;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* subtle background radial glow */
    .hero-wrap {
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      padding: 4rem 2rem;
      position: relative;
      overflow: hidden;
    }

    .hero-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 15% 50%, rgba(29,158,117,0.07) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(15,110,86,0.05) 0%, transparent 45%);
      pointer-events: none;
    }

    .hero-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: center;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* ── Label ── */
    .hero-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: #5F5E5A;
      margin-bottom: 1.25rem;
      background: rgba(29,158,117,0.08);
      border: 1px solid rgba(29,158,117,0.22);
      padding: 6px 14px;
      border-radius: 50px;
    }

    .hero-label-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #1D9E75;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── Heading ── */
    .hero-heading {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 4vw, 3.4rem);
      font-weight: 900;
      line-height: 1.12;
      color: #1a1a1a;
      margin-bottom: 0.4rem;
    }

    .hero-heading .static {
      display: block;
    }

    /* ── Word Rotator ── */
    .word-rotator {
      display: inline-block;
      position: relative;
      height: 1.15em;
      overflow: hidden;
      vertical-align: bottom;
    }

    .word-rotator-inner {
      display: flex;
      flex-direction: column;
      animation: slideWords 8s ease-in-out infinite;
    }

    .word-rotator-inner span {
      display: block;
      line-height: 1.15;
      background: linear-gradient(135deg, #1D9E75 0%, #0F6E56 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
    }

    @keyframes slideWords {
      0%   { transform: translateY(0%); }
      15%  { transform: translateY(0%); }
      25%  { transform: translateY(-25%); }
      40%  { transform: translateY(-25%); }
      50%  { transform: translateY(-50%); }
      65%  { transform: translateY(-50%); }
      75%  { transform: translateY(-75%); }
      90%  { transform: translateY(-75%); }
      100% { transform: translateY(0%); }
    }

    /* ── Decorative Divider ── */
    .hero-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.4rem 0 1.6rem;
    }

    .divider-line {
      height: 1.5px;
      width: 52px;
      border-radius: 2px;
    }

    .divider-line.left  { background: linear-gradient(90deg, #1D9E75, transparent); }
    .divider-line.right { background: linear-gradient(90deg, transparent, #1D9E75); }

    .divider-dots {
      display: flex;
      gap: 4px;
    }

    .divider-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #1D9E75;
    }

    .divider-dots span:nth-child(1) { opacity: 1.0; }
    .divider-dots span:nth-child(2) { opacity: 0.55; }
    .divider-dots span:nth-child(3) { opacity: 0.25; }

    /* ── Description ── */
    .hero-desc {
      font-size: 15px;
      line-height: 1.75;
      color: #5F5E5A;
      margin-bottom: 2rem;
      max-width: 420px;
      font-weight: 300;
    }

    /* ── Buttons ── */
    .hero-btns {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }

    .btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .btn-primary {
      background: #0F6E56;
      color: #fff;
      border: 2px solid #0F6E56;
    }

    .btn-primary:hover  { background: #085041; border-color: #085041; transform: translateY(-2px); }
    .btn-primary:active { transform: scale(0.97); }

    .btn-secondary {
      background: transparent;
      color: #1a1a1a;
      border: 1.5px solid #B4B2A9;
    }

    .btn-secondary:hover {
      border-color: #1D9E75;
      color: #0F6E56;
      background: #E1F5EE;
      transform: translateY(-2px);
    }

    .btn-secondary:active { transform: scale(0.97); }

    /* ── Right / Lottie ── */
    .hero-right {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lottie-stage {
      width: 100%;
      max-width: 480px;
      aspect-ratio: 1;
      position: relative;
    }

    /* soft green glow behind the lottie */
    .lottie-stage::before {
      content: '';
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(29,158,117,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    lottie-player {
      width: 100%;
      height: 100%;
    }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .hero-inner {
        grid-template-columns: 1fr;
        gap: 2rem;
      }

      .hero-right {
        order: -1;
      }

      .lottie-stage {
        max-width: 280px;
        margin: 0 auto;
      }

      .hero-desc { max-width: 100%; }
    }
  </style>
</head>
<body>

<section class="hero-wrap">
  <div class="hero-inner">

    <!-- ══════════ LEFT SIDE ══════════ -->
    <div class="hero-left">

      <div class="hero-label">
        <span class="hero-label-dot"></span>
        Creative Studio
      </div>

      <h1 class="hero-heading">
        <span class="static">Let's make something</span>
        <span class="word-rotator">
          <span class="word-rotator-inner">
            <span>Outstanding.</span>
            <span>Engaging.</span>
            <span>Innovative.</span>
            <span>Strategic.</span>
          </span>
        </span>
      </h1>

      <div class="hero-divider">
        <div class="divider-line left"></div>
        <div class="divider-dots">
          <span></span><span></span><span></span>
        </div>
        <div class="divider-line right"></div>
      </div>

      <p class="hero-desc">
        We craft experiences that captivate audiences and drive real results — from bold brands to seamless digital products.
      </p>

      <div class="hero-btns">

        <!-- Message Button -->
        <a href="#" class="btn btn-primary">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 3a1 1 0 011-1h10a1 1 0 011 1v9a1 1 0 01-1 1H3a1 1 0 01-1-1V3z" stroke="white" stroke-width="1.2"/>
            <path d="M5 7h6M5 9.5h4" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          Message
        </a>

        <!-- Call Now Button -->
        <a href="tel:+1234567890" class="btn btn-secondary">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M13.5 11.5L11 9l-1.5 1.5a9.5 9.5 0 01-4-4L7 5 4.5 2.5l-2 2A10 10 0 0013.5 13.5l2-2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
          </svg>
          Call Now
        </a>

      </div>
    </div>

    <!-- ══════════ RIGHT SIDE — Lottie ══════════ -->
    <div class="hero-right">
      <div class="lottie-stage">
        <!--
          FREE Lottie animation from LottieFiles (lottie.host CDN)
          Animation: "Teamwork / Collaboration" by LottieFiles
          Replace the src URL with any .lottie or .json URL from https://lottiefiles.com
        -->
        <lottie-player
          src="/Ball playing.json"
          background="transparent"
          speed="1"
          loop
          autoplay>
        </lottie-player>
      </div>
    </div>

  </div>
</section>

</body>
</html>

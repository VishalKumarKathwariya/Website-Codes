<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adelt – CEO Section</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #F55D00;
      --bg: #f4f4f2;
      --bubble-bg: #eeede9;
      --radius: 28px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: #111;
    }

    /* ══════════════════════════════
       DESKTOP  (> 900px)
       Two-column grid: [left | right]
    ══════════════════════════════ */
    .ceo-section {
      padding: 72px 64px;
      display: grid;
      grid-template-columns: 260px 1fr;
      grid-template-rows: auto;
      gap: 52px;
      align-items: center;
      max-width: 1160px;
      margin: 0 auto;
    }

    /* Desktop left col: title + photo card stacked */
    .left-col {
      display: flex;
      flex-direction: column;
      gap: 32px;
      grid-column: 1;
      grid-row: 1;
    }

    /* Desktop right col: bubbles + CTA */
    .right-col {
      display: flex;
      flex-direction: column;
      gap: 14px;
      grid-column: 2;
      grid-row: 1;
    }

    /* ── Section title ── */
    .section-title {
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      font-weight: 500;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    /* ── CEO Photo ── */
    .ceo-card { display: flex; flex-direction: column; gap: 12px; }

    .ceo-photo-wrap {
      position: relative;
      width: 155px;
      height: 178px;
    }

    .ceo-avatar-placeholder {
      width: 100%;
      height: 100%;
      border-radius: 16px;
      background: linear-gradient(145deg, #d4c5b0 0%, #b9a48a 100%);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
    }

    .ceo-avatar-placeholder svg {
      width: 72%;
      fill: #a08060;
      margin-bottom: -2px;
    }

    .linkedin-badge {
      position: absolute;
      bottom: -10px;
      right: -10px;
      width: 40px;
      height: 40px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 10px rgba(0,0,0,.14);
      cursor: pointer;
      transition: transform .2s;
    }
    .linkedin-badge:hover { transform: scale(1.08); }
    .linkedin-badge svg { width: 22px; height: 22px; }

    .ceo-info { padding-top: 14px; }
    .ceo-name { font-size: 1rem; font-weight: 600; }
    .ceo-role { font-size: .88rem; color: #555; margin-top: 2px; }

    /* ── Bubbles ── */
    .bubble {
      background: var(--bubble-bg);
      border-radius: var(--radius);
      padding: 22px 28px;
      font-size: 1.05rem;
      line-height: 1.65;
      color: #222;
      animation: fadeUp .45s ease both;
    }
    .bubble:nth-child(1) { animation-delay: .08s; }
    .bubble:nth-child(2) { animation-delay: .2s; align-self: flex-start; }

    /* ── CTA card ── */
    .cta-card {
      background: var(--orange);
      border-radius: var(--radius);
      padding: 30px 30px 30px 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      animation: fadeUp .45s .32s ease both;
    }

    .cta-text {
      font-size: clamp(1.1rem, 1.8vw, 1.5rem);
      font-weight: 500;
      color: #fff;
      line-height: 1.3;
      letter-spacing: -.01em;
    }

    .cta-btn {
      flex-shrink: 0;
      background: #fff;
      color: #111;
      border: none;
      border-radius: 999px;
      padding: 13px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background .2s, color .2s, transform .15s;
      white-space: nowrap;
    }
    .cta-btn:hover { background: #111; color: #fff; transform: scale(1.03); }

    .arrow-icon {
      width: 28px; height: 28px;
      background: #111;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .cta-btn:hover .arrow-icon { background: #fff; }
    .cta-btn:hover .arrow-icon svg { stroke: #111; }
    .arrow-icon svg {
      width: 13px; height: 13px;
      stroke: #fff; stroke-width: 2.2;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══════════════════════════════
       TABLET / MOBILE  (≤ 900px)
       Single column:
         1. Title
         2. Bubbles + CTA
         3. CEO photo (bottom)
    ══════════════════════════════ */
    @media (max-width: 900px) {
      .ceo-section {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        padding: 48px 36px;
        gap: 28px;
      }

      /* Row 1 – title */
      .section-title {
        grid-column: 1;
        grid-row: 1;
        font-size: clamp(1.7rem, 5vw, 2.2rem);
      }

      /* Row 2 – bubbles + CTA */
      .right-col {
        grid-column: 1;
        grid-row: 2;
      }

      /* Row 3 – CEO photo (pulled to bottom) */
      .left-col {
        grid-column: 1;
        grid-row: 3;
        flex-direction: row;      /* photo + info side by side */
        align-items: flex-end;
        gap: 20px;
      }

      /* Hide the title inside left-col (already shown above via grid) */
      .left-col .section-title { display: none; }
    }

    @media (max-width: 560px) {
      .ceo-section { padding: 36px 20px; gap: 22px; }
      .bubble { font-size: .95rem; padding: 18px 20px; }
      .cta-card { flex-direction: column; align-items: flex-start; gap: 18px; }
      .cta-text { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<section class="ceo-section">

  <!-- LEFT COL: title (desktop) + CEO photo card -->
  <div class="left-col">
    <h2 class="section-title">And a few words from CEO</h2>
    <div class="ceo-card">
      <div class="ceo-photo-wrap">
        <div class="ceo-avatar-placeholder" aria-label="Anastasia Dontsova">
          <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="50" cy="34" rx="22" ry="24"/>
            <path d="M5 120 Q5 74 50 71 Q95 74 95 120Z"/>
          </svg>
        </div>
        <div class="linkedin-badge" title="LinkedIn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect width="24" height="24" rx="4" fill="#0A66C2"/>
            <path d="M7 10H9.5V17H7V10ZM8.25 9A1.25 1.25 0 1 0 8.25 6.5 1.25 1.25 0 0 0 8.25 9Z" fill="white"/>
            <path d="M11 10H13.4V11.1H13.43C13.77 10.5 14.56 9.85 15.73 9.85C18.28 9.85 18.75 11.52 18.75 13.7V17H16.25V14.2C16.25 13.25 16.23 12.03 14.93 12.03C13.61 12.03 13.4 13.07 13.4 14.12V17H11V10Z" fill="white"/>
          </svg>
        </div>
      </div>
      <div class="ceo-info">
        <div class="ceo-name">Anastasia Dontsova</div>
        <div class="ceo-role">CEO adelt</div>
      </div>
    </div>
  </div>

  <!-- TITLE for tablet/mobile (shown via grid-row: 1 on ≤900px, hidden on desktop via left-col .section-title) -->
  <!-- We reuse the .section-title inside left-col and toggle it via CSS — no duplicate needed -->

  <!-- RIGHT COL: bubbles + CTA -->
  <div class="right-col">
    <div class="bubble">
      At ADELT we're passionate about weaving together standout marketing strategies, creating memorable branding, and delivering sleek web designs 💥
    </div>
    <div class="bubble">
      Can't wait to start your project!
    </div>
    <div class="cta-card">
      <div class="cta-text">Book a trial 15-min workshop<br>for your business</div>
      <button class="cta-btn">
        SCHEDULE A CALL
        <span class="arrow-icon">
          <svg viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg">
            <line x1="2" y1="12" x2="12" y2="2"/>
            <polyline points="6,2 12,2 12,8"/>
          </svg>
        </span>
      </button>
    </div>
  </div>

</section>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design 14 · Liquid Shapes</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f0f;
      font-family: 'Inter', system-ui, sans-serif;
      color: #fff;
    }

    .section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
      position: relative;
      isolation: isolate;
      overflow: hidden;
    }

    .section::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(150, 100, 255, 0.3), transparent 50%),
                  radial-gradient(circle at 80% 70%, rgba(255, 150, 100, 0.25), transparent 50%);
      filter: blur(60px);
      z-index: -1;
    }

    .section-title {
      font-size: 2.2rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 3rem;
      background: linear-gradient(135deg, #d6b0ff, #ffb0c0);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .liquid-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    .liquid-card {
      background: rgba(20, 20, 30, 0.5);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      border-radius: 50px 20px 50px 20px;  /* organic */
      padding: 2rem 1.8rem;
      text-align: center;
      border: 2px solid transparent;
      background-clip: padding-box;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      transition: all 0.3s;
      position: relative;
    }

    .liquid-card::before {
      content: '';
      position: absolute;
      inset: -2px;
      z-index: -1;
      background: linear-gradient(145deg, #a58eff, #ff9a9e);
      border-radius: inherit;
      opacity: 0.4;
      transition: opacity 0.3s;
    }

    .liquid-card:hover::before {
      opacity: 0.8;
    }

    .icon {
      font-size: 3rem;
      background: linear-gradient(135deg, #fff, #e0e0e0);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }

    .feature-title {
      font-size: 1.7rem;
      margin-bottom: 0.5rem;
    }

    .feature-desc {
      color: #bbb;
    }

    @media (min-width: 640px) {
      .liquid-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .liquid-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <section class="section">
    <h2 class="section-title">fluid experience</h2>
    <div class="liquid-grid">
      <div class="liquid-card">
        <i class="fas fa-water icon"></i>
        <h3 class="feature-title">Adaptive</h3>
        <p class="feature-desc">Flows seamlessly across devices.</p>
      </div>
      <div class="liquid-card">
        <i class="fas fa-droplet icon"></i>
        <h3 class="feature-title">Fresh</h3>
        <p class="feature-desc">Always up‑to‑date with latest trends.</p>
      </div>
      <div class="liquid-card">
        <i class="fas fa-wind icon"></i>
        <h3 class="feature-title">Light</h3>
        <p class="feature-desc">Minimal footprint, maximum speed.</p>
      </div>
      <div class="liquid-card">
        <i class="fas fa-feather icon"></i>
        <h3 class="feature-title">Graceful</h3>
        <p class="feature-desc">Elegant interactions and transitions.</p>
      </div>
    </div>
  </section>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design 8 · Floating Icons & Blobs</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d0d0d;
      font-family: system-ui, sans-serif;
      color: #f0f0f0;
    }

    .section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* background blobs */
    .section::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(100,80,220,0.4) 0%, transparent 70%);
      top: -100px;
      left: -100px;
      filter: blur(60px);
      z-index: 0;
      animation: blobMove 15s infinite alternate ease-in-out;
    }
    .section::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(220,80,160,0.3) 0%, transparent 70%);
      bottom: -150px;
      right: -100px;
      filter: blur(70px);
      z-index: 0;
      animation: blobMove2 18s infinite alternate ease-in-out;
    }

    @keyframes blobMove {
      0% { transform: translate(0,0) scale(1); }
      100% { transform: translate(80px, 60px) scale(1.2); }
    }
    @keyframes blobMove2 {
      0% { transform: translate(0,0) scale(1.1); }
      100% { transform: translate(-70px, -40px) scale(0.9); }
    }

    .section-title {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 2.5rem;
      position: relative;
      z-index: 2;
      color: #ffffff;
      text-shadow: 0 0 10px rgba(0,200,255,0.5);
    }

    .features-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
      position: relative;
      z-index: 2;
    }

    .float-card {
      background: rgba(20, 20, 30, 0.7);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      border-radius: 30px;
      padding: 2rem 1.5rem;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 20px 40px -15px black;
    }

    .float-icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      display: inline-block;
      animation: float 4s ease-in-out infinite;
      color: #ffb3c6;
    }

    /* different delays */
    .float-card:nth-child(1) .float-icon { animation-delay: 0s; }
    .float-card:nth-child(2) .float-icon { animation-delay: 0.6s; }
    .float-card:nth-child(3) .float-icon { animation-delay: 1.2s; }
    .float-card:nth-child(4) .float-icon { animation-delay: 0.2s; }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }

    .feature-title {
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
    }

    .feature-desc {
      color: #b0b0b0;
    }

    @media (min-width: 640px) {
      .features-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (min-width: 1024px) {
      .features-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <section class="section">
    <h2 class="section-title">Floating vibes</h2>
    <div class="features-grid">
      <div class="float-card">
        <i class="fas fa-cloud float-icon"></i>
        <h3 class="feature-title">Dreamy</h3>
        <p class="feature-desc">Icons that gently float above blurred blobs.</p>
      </div>
      <div class="float-card">
        <i class="fas fa-feather float-icon"></i>
        <h3 class="feature-title">Light</h3>
        <p class="feature-desc">Airy and modern aesthetic.</p>
      </div>
      <div class="float-card">
        <i class="fas fa-water float-icon"></i>
        <h3 class="feature-title">Fluid</h3>
        <p class="feature-desc">Smooth animations and organic shapes.</p>
      </div>
      <div class="float-card">
        <i class="fas fa-wind float-icon"></i>
        <h3 class="feature-title">Breezy</h3>
        <p class="feature-desc">Subtle movement captures attention.</p>
      </div>
    </div>
  </section>
</body>
</html>

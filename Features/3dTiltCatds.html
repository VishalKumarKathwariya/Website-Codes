<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design 7 · 3D Tilt</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #111;
      font-family: system-ui, sans-serif;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    .section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      width: 100%;
    }

    .section-title {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 2.5rem;
      color: #aaddff;
    }

    .tilt-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    .tilt-card {
      background: #1e1e2f;
      border-radius: 30px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      transform-style: preserve-3d;
      transform: perspective(500px) rotateX(0deg) rotateY(0deg);
      transition: box-shadow 0.2s;
      box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.8);
      will-change: transform;
      cursor: pointer;
    }

    .tilt-card:hover {
      box-shadow: 0 30px 40px -10px #000;
    }

    .icon {
      font-size: 3.2rem;
      color: #9f7aea;
      margin-bottom: 1rem;
      transform: translateZ(30px);
    }

    .feature-title {
      font-size: 1.7rem;
      margin-bottom: 0.5rem;
      transform: translateZ(20px);
    }

    .feature-desc {
      color: #bcbcbc;
      transform: translateZ(15px);
    }

    @media (min-width: 640px) {
      .tilt-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (min-width: 1024px) {
      .tilt-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <section class="section">
    <h2 class="section-title">Interactive 3D tilt</h2>
    <div class="tilt-grid" id="tiltGrid">
      <div class="tilt-card" data-tilt>
        <i class="fas fa-cube icon"></i>
        <h3 class="feature-title">3D ready</h3>
        <p class="feature-desc">Smooth tilt effect using javascript.</p>
      </div>
      <div class="tilt-card" data-tilt>
        <i class="fas fa-mouse-pointer icon"></i>
        <h3 class="feature-title">Mouse driven</h3>
        <p class="feature-desc">Follows your cursor naturally.</p>
      </div>
      <div class="tilt-card" data-tilt>
        <i class="fas fa-code icon"></i>
        <h3 class="feature-title">Lightweight</h3>
        <p class="feature-desc">No external libraries, pure JS.</p>
      </div>
      <div class="tilt-card" data-tilt>
        <i class="fas fa-magic icon"></i>
        <h3 class="feature-title">Delightful</h3>
        <p class="feature-desc">Adds a wow factor to your site.</p>
      </div>
    </div>
  </section>

  <script>
    (function() {
      const cards = document.querySelectorAll('[data-tilt]');

      cards.forEach(card => {
        card.addEventListener('mousemove', handleMouseMove);
        card.addEventListener('mouseleave', resetTilt);
      });

      function handleMouseMove(e) {
        const card = e.currentTarget;
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;   // mouse x within card
        const y = e.clientY - rect.top;     // mouse y within card

        const centerX = rect.width / 2;
        const centerY = rect.height / 2;

        const rotateX = ((y - centerY) / centerY) * -8;   // max ±8deg
        const rotateY = ((x - centerX) / centerX) * 8;

        card.style.transform = `perspective(500px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      }

      function resetTilt(e) {
        const card = e.currentTarget;
        card.style.transform = `perspective(500px) rotateX(0deg) rotateY(0deg)`;
      }
    })();
  </script>
</body>
</html>

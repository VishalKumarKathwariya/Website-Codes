<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design 5 · Dark Neumorphism</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #202020;
      font-family: system-ui, sans-serif;
      color: #ddd;
    }

    .section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    .section-title {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 2.5rem;
      color: #e0e0e0;
      text-shadow: 3px 3px 6px #0a0a0a, -3px -3px 6px #3a3a3a;
    }

    .features-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.8rem;
    }

    .neumorph-card {
      background: #2a2a2a;
      border-radius: 40px;
      padding: 2rem 1.5rem;
      text-align: center;
      box-shadow: 8px 8px 16px #0f0f0f, -8px -8px 16px #3f3f3f;
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .neumorph-card:hover {
      box-shadow: 12px 12px 24px #0a0a0a, -12px -12px 24px #4a4a4a;
      transform: scale(1.02);
    }

    .icon {
      font-size: 3rem;
      color: #c0c0c0;
      margin-bottom: 1rem;
      filter: drop-shadow(2px 2px 4px #0f0f0f);
    }

    .feature-title {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
      font-weight: 500;
    }

    .feature-desc {
      color: #b0b0b0;
    }

    @media (min-width: 640px) {
      .features-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (min-width: 1024px) {
      .features-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <section class="section">
    <h2 class="section-title">Soft neumorphism</h2>
    <div class="features-grid">
      <div class="neumorph-card">
        <i class="fas fa-microchip icon"></i>
        <h3 class="feature-title">Hardware ready</h3>
        <p class="feature-desc">Optimized for edge devices.</p>
      </div>
      <div class="neumorph-card">
        <i class="fas fa-code icon"></i>
        <h3 class="feature-title">Clean code</h3>
        <p class="feature-desc">Easy to maintain and extend.</p>
      </div>
      <div class="neumorph-card">
        <i class="fas fa-chart-pie icon"></i>
        <h3 class="feature-title">Analytics</h3>
        <p class="feature-desc">Built‑in metrics dashboard.</p>
      </div>
      <div class="neumorph-card">
        <i class="fas fa-robot icon"></i>
        <h3 class="feature-title">AI ready</h3>
        <p class="feature-desc">Integrate models seamlessly.</p>
      </div>
    </div>
  </section>
</body>
</html>

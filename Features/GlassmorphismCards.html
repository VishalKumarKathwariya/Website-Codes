<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design 2 · Glassmorphism</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0c0c0c;
      font-family: system-ui, sans-serif;
      color: #f0f0f0;
    }

    .section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
      position: relative;
    }

    .section::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 30%, #2a4a6e, #0f0f0f);
      z-index: -1;
    }

    .section-title {
      font-size: 2rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 2.5rem;
      background: linear-gradient(120deg, #ffffff, #b0e0ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .features-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 32px;
      padding: 2rem 1.5rem;
      text-align: center;
      transition: background 0.3s, border-color 0.3s;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6);
    }

    .glass-card:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .icon {
      font-size: 3rem;
      color: #aaddff;
      margin-bottom: 1rem;
    }

    .feature-title {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
      font-weight: 500;
    }

    .feature-desc {
      color: #cccccc;
      font-size: 0.95rem;
    }

    @media (min-width: 640px) {
      .features-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .features-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <section class="section">
    <h2 class="section-title">Glass features</h2>
    <div class="features-grid">
      <div class="glass-card">
        <i class="fas fa-crown icon"></i>
        <h3 class="feature-title">Premium design</h3>
        <p class="feature-desc">Elegant glassmorphism that feels modern and sleek.</p>
      </div>
      <div class="glass-card">
        <i class="fas fa-infinity icon"></i>
        <h3 class="feature-title">Endless possibilities</h3>
        <p class="feature-desc">Adapt to any screen with fluid responsive layout.</p>
      </div>
      <div class="glass-card">
        <i class="fas fa-palette icon"></i>
        <h3 class="feature-title">Customizable</h3>
        <p class="feature-desc">Easily tweak colors and blur to match your brand.</p>
      </div>
      <div class="glass-card">
        <i class="fas fa-shield-alt icon"></i>
        <h3 class="feature-title">Reliable</h3>
        <p class="feature-desc">Built with production‑grade HTML/CSS.</p>
      </div>
    </div>
  </section>
</body>
</html>

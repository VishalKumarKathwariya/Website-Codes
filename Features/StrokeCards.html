<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design 18 · Outlined</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #111;
      font-family: 'Inter', system-ui, sans-serif;
      color: #eee;
    }

    .section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    .section-title {
      font-size: 2.2rem;
      font-weight: 500;
      text-align: center;
      margin-bottom: 2.5rem;
      color: #fff;
    }

    .outline-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.8rem;
    }

    .outline-card {
      background: transparent;
      border: 2px solid #333;
      border-radius: 32px;
      padding: 2.2rem 1.5rem;
      text-align: center;
      transition: border-color 0.2s, transform 0.2s;
    }

    .outline-card:hover {
      border-color: #9f7aea;
      transform: translateY(-4px);
    }

    .icon {
      font-size: 3rem;
      color: #9f7aea;
      margin-bottom: 1rem;
    }

    .feature-title {
      font-size: 1.7rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .feature-desc {
      color: #aaa;
    }

    @media (min-width: 640px) {
      .outline-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .outline-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <section class="section">
    <h2 class="section-title">minimal outline</h2>
    <div class="outline-grid">
      <div class="outline-card">
        <i class="fas fa-circle icon"></i>
        <h3 class="feature-title">Simple</h3>
        <p class="feature-desc">Clean, uncluttered design.</p>
      </div>
      <div class="outline-card">
        <i class="fas fa-square icon"></i>
        <h3 class="feature-title">Geometric</h3>
        <p class="feature-desc">Precise shapes and balance.</p>
      </div>
      <div class="outline-card">
        <i class="fas fa-triangle-exclamation icon"></i>
        <h3 class="feature-title">Bold</h3>
        <p class="feature-desc">Make a statement.</p>
      </div>
      <div class="outline-card">
        <i class="fas fa-heart icon"></i>
        <h3 class="feature-title">Loved</h3>
        <p class="feature-desc">Trusted by thousands.</p>
      </div>
    </div>
  </section>
</body>
</html>

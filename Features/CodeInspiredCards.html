<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design 13 · Terminal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0c0c0c;
      font-family: 'Courier New', 'Fira Code', monospace;
      color: #00ff9d;
    }

    .section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    .section-title {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 2.5rem;
      color: #00ff9d;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .terminal-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    .terminal-card {
      background: #1a1a1a;
      border: 1px solid #00ff9d;
      box-shadow: 0 0 10px rgba(0,255,157,0.2);
      padding: 1.8rem 1.5rem;
      border-radius: 0; /* sharp edges */
      transition: box-shadow 0.2s;
      position: relative;
    }

    .terminal-card::before {
      content: '$>';
      position: absolute;
      top: 1rem;
      left: 1rem;
      color: #00cc88;
      font-weight: bold;
      opacity: 0.5;
    }

    .terminal-card:hover {
      box-shadow: 0 0 20px #00ff9d;
    }

    .icon {
      font-size: 2.5rem;
      color: #00ff9d;
      margin-bottom: 1rem;
      margin-left: 1.2rem; /* offset for prompt */
    }

    .feature-title {
      font-size: 1.5rem;
      font-family: inherit;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .feature-desc {
      color: #b0ffd0;
      font-family: inherit;
      font-size: 0.9rem;
    }

    @media (min-width: 640px) {
      .terminal-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .terminal-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <section class="section">
    <h2 class="section-title">~ $ features</h2>
    <div class="terminal-grid">
      <div class="terminal-card">
        <i class="fas fa-terminal icon"></i>
        <h3 class="feature-title">CLI first</h3>
        <p class="feature-desc">Full command‑line interface for power users.</p>
      </div>
      <div class="terminal-card">
        <i class="fas fa-code-branch icon"></i>
        <h3 class="feature-title">Git ready</h3>
        <p class="feature-desc">Seamless integration with version control.</p>
      </div>
      <div class="terminal-card">
        <i class="fas fa-shield icon"></i>
        <h3 class="feature-title">Secure shell</h3>
        <p class="feature-desc">End‑to‑end encrypted sessions.</p>
      </div>
      <div class="terminal-card">
        <i class="fas fa-cloud icon"></i>
        <h3 class="feature-title">Cloud sync</h3>
        <p class="feature-desc">Sync configs across all machines.</p>
      </div>
    </div>
  </section>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design 4 · Gradient Border</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b0f;
      font-family: system-ui, sans-serif;
      color: #ddd;
    }

    .section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    .section-title {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 2.5rem;
      background: linear-gradient(145deg, #ffb86b, #ff6bcb);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .features-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.8rem;
    }

    /* wrapper for gradient border */
    .card-wrapper {
      background: conic-gradient(from 0deg, #ff6b6b, #4ecdc4, #45b7d1, #ff6b6b);
      padding: 3px;                /* border thickness */
      border-radius: 32px;
      transition: all 0.4s ease;
      animation: rotate 4s linear infinite paused;  /* pause by default */
    }

    .card-wrapper:hover {
      animation: rotate 4s linear infinite running;
    }

    @keyframes rotate {
      0% { background: conic-gradient(from 0deg, #ff6b6b, #4ecdc4, #45b7d1, #ff6b6b); }
      100% { background: conic-gradient(from 360deg, #ff6b6b, #4ecdc4, #45b7d1, #ff6b6b); }
    }

    .feature-card {
      background: #14141a;
      border-radius: 30px;          /* slightly smaller than wrapper */
      padding: 2rem 1.5rem;
      text-align: center;
      height: 100%;
    }

    .icon {
      font-size: 3rem;
      background: linear-gradient(145deg, #ffb347, #ff7e5f);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }

    .feature-title {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
      color: #fff;
    }

    .feature-desc {
      color: #aaa;
    }

    @media (min-width: 640px) {
      .features-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (min-width: 1024px) {
      .features-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <section class="section">
    <h2 class="section-title">Gradient edge</h2>
    <div class="features-grid">
      <div class="card-wrapper">
        <div class="feature-card">
          <i class="fas fa-gem icon"></i>
          <h3 class="feature-title">Premium</h3>
          <p class="feature-desc">Unique animated borders that catch the eye.</p>
        </div>
      </div>
      <div class="card-wrapper">
        <div class="feature-card">
          <i class="fas fa-cog icon"></i>
          <h3 class="feature-title">Customizable</h3>
          <p class="feature-desc">Change colors and speed easily.</p>
        </div>
      </div>
      <div class="card-wrapper">
        <div class="feature-card">
          <i class="fas fa-magic icon"></i>
          <h3 class="feature-title">Magic touch</h3>
          <p class="feature-desc">Delight users with subtle animations.</p>
        </div>
      </div>
      <div class="card-wrapper">
        <div class="feature-card">
          <i class="fas fa-shield icon"></i>
          <h3 class="feature-title">Durable</h3>
          <p class="feature-desc">Built to last, trend‑proof design.</p>
        </div>
      </div>
    </div>
  </section>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design 10 · Accent Bar & Glow</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #101010;
      font-family: system-ui, sans-serif;
      color: #f0f0f0;
    }

    .section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    .section-title {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 2.5rem;
      color: #ffffff;
    }

    .accent-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.8rem;
    }

    .accent-card {
      background: #1b1b1b;
      border-radius: 24px;
      padding: 2rem 1.5rem;
      text-align: center;
      border-top: 6px solid;
      transition: transform 0.2s;
      box-shadow: 0 12px 25px rgba(0,0,0,0.7);
    }

    /* individual bar colors */
    .accent-card:nth-child(1) { border-top-color: #ff6b6b; }
    .accent-card:nth-child(2) { border-top-color: #4ecdc4; }
    .accent-card:nth-child(3) { border-top-color: #ffe66d; }
    .accent-card:nth-child(4) { border-top-color: #c77dff; }

    .accent-card:hover {
      transform: scale(1.02);
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      color: #e0e0e0;
    }

    .feature-title {
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
      display: inline-block;
      position: relative;
    }

    .feature-title::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 100%;
      height: 2px;
      background: currentColor;
      transform: scaleX(0);
      transition: transform 0.25s ease;
    }

    .accent-card:hover .feature-title::after {
      transform: scaleX(1);
      box-shadow: 0 0 10px currentColor;
    }

    .feature-desc {
      color: #b0b0b0;
      margin-top: 0.75rem;
    }

    @media (min-width: 640px) {
      .accent-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (min-width: 1024px) {
      .accent-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <section class="section">
    <h2 class="section-title">Colour accents</h2>
    <div class="accent-grid">
      <div class="accent-card">
        <i class="fas fa-fire icon"></i>
        <h3 class="feature-title">Hot</h3>
        <p class="feature-desc">Trending features with real‑time updates.</p>
      </div>
      <div class="accent-card">
        <i class="fas fa-droplet icon"></i>
        <h3 class="feature-title">Fresh</h3>
        <p class="feature-desc">Regular updates and new content.</p>
      </div>
      <div class="accent-card">
        <i class="fas fa-sun icon"></i>
        <h3 class="feature-title">Bright</h3>
        <p class="feature-desc">Clean UI with vibrant accents.</p>
      </div>
      <div class="accent-card">
        <i class="fas fa-moon icon"></i>
        <h3 class="feature-title">Dark</h3>
        <p class="feature-desc">Easy on the eyes, day and night.</p>
      </div>
    </div>
  </section>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design 12 · Bento Grid</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0e0e0e;
      font-family: 'Inter', system-ui, sans-serif;
      color: #eee;
    }

    .section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    .section-title {
      font-size: 2.2rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 2.5rem;
      color: #fff;
    }

    .bento {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    .bento-item {
      background: #1c1c1e;
      border-radius: 32px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      transition: all 0.2s;
      border: 1px solid #333;
    }

    .bento-item:hover {
      background: #222;
      border-color: #555;
    }

    .bento-icon {
      font-size: 2.5rem;
      margin-bottom: 1.5rem;
      color: #5e9eff;
    }

    .bento-title {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .bento-desc {
      color: #aaa;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    /* bento variations for larger screens */
    @media (min-width: 640px) {
      .bento {
        grid-template-columns: repeat(3, 1fr);
        grid-auto-rows: minmax(180px, auto);
      }
      .bento-item:first-child {
        grid-column: span 2;   /* wider card */
      }
      .bento-item:last-child {
        grid-column: span 2;
      }
    }

    @media (min-width: 1024px) {
      .bento {
        grid-template-columns: repeat(4, 1fr);
      }
      .bento-item:first-child {
        grid-column: span 2;
        grid-row: span 2;
      }
      .bento-item:nth-child(2) {
        grid-column: span 2;
      }
    }
  </style>
</head>
<body>
  <section class="section">
    <h2 class="section-title">Bento features</h2>
    <div class="bento">
      <div class="bento-item">
        <i class="fas fa-brain bento-icon"></i>
        <h3 class="bento-title">AI‑powered</h3>
        <p class="bento-desc">Intelligent insights that adapt to your workflow.</p>
      </div>
      <div class="bento-item">
        <i class="fas fa-cloud bento-icon"></i>
        <h3 class="bento-title">Cloud native</h3>
        <p class="bento-desc">Deploy anywhere with our multi‑cloud support.</p>
      </div>
      <div class="bento-item">
        <i class="fas fa-chart-pie bento-icon"></i>
        <h3 class="bento-title">Analytics</h3>
        <p class="bento-desc">Real‑time dashboards and custom reports.</p>
      </div>
      <div class="bento-item">
        <i class="fas fa-rocket bento-icon"></i>
        <h3 class="bento-title">Fast track</h3>
        <p class="bento-desc">Get started in minutes with pre‑built templates.</p>
      </div>
    </div>
  </section>
</body>
</html>

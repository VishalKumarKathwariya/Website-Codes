<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>07 — Instagram Story Carousel</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    background: #000;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
  }

  .page-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 8px;
    text-align: center;
  }

  .page-title {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
    text-align: center;
  }

  .page-sub {
    font-size: 13px;
    color: #666;
    margin-bottom: 32px;
    text-align: center;
  }

  /* Avatar strip */
  .avatar-strip {
    display: flex;
    gap: 20px;
    margin-bottom: 32px;
    overflow-x: auto;
    padding: 4px 0 8px;
    max-width: 480px;
    width: 100%;
  }

  .avatar-strip::-webkit-scrollbar { display: none; }

  .story-avatar {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .avatar-ring {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    padding: 2.5px;
    background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    transition: transform .2s;
  }

  .avatar-ring:hover { transform: scale(1.06); }
  .avatar-ring.active { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
  .avatar-ring.viewed { background: #333; }

  .avatar-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #222;
    border: 2.5px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
  }

  .avatar-name { font-size: 11px; color: #e5e5e5; white-space: nowrap; max-width: 68px; overflow: hidden; text-overflow: ellipsis; text-align: center; }

  /* Story viewer */
  .story-viewer {
    width: 360px;
    height: 640px;
    border-radius: 24px;
    overflow: hidden;
    position: relative;
    background: #111;
    box-shadow: 0 30px 80px rgba(0,0,0,.8), 0 0 0 1px rgba(255,255,255,.06);
  }

  /* Slides */
  .story-slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    opacity: 0;
    transition: opacity .15s;
    pointer-events: none;
  }

  .story-slide.active { opacity: 1; pointer-events: all; }

  .story-bg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 160px;
    overflow: hidden;
  }

  .story-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,.5) 0%, transparent 30%, transparent 50%, rgba(0,0,0,.75) 100%);
  }

  /* Progress bars */
  .progress-bars {
    position: absolute;
    top: 16px;
    left: 14px;
    right: 14px;
    display: flex;
    gap: 4px;
    z-index: 20;
  }

  .pb-bg {
    flex: 1;
    height: 2.5px;
    background: rgba(255,255,255,.3);
    border-radius: 2px;
    overflow: hidden;
  }

  .pb-fill {
    height: 100%;
    background: #fff;
    border-radius: 2px;
    width: 0%;
  }

  /* Story header */
  .story-header {
    position: absolute;
    top: 36px;
    left: 14px;
    right: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 15;
  }

  .sh-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,.8);
    background: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .sh-name { font-size: 14px; font-weight: 600; color: #fff; }
  .sh-time { font-size: 12px; color: rgba(255,255,255,.65); margin-top: 1px; }

  .sh-right { margin-left: auto; display: flex; gap: 16px; align-items: center; }
  .sh-icon { font-size: 20px; color: #fff; cursor: pointer; }

  /* Story content */
  .story-content {
    position: relative;
    z-index: 10;
    padding: 0 18px 18px;
  }

  .story-text {
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    line-height: 1.3;
    text-shadow: 0 1px 12px rgba(0,0,0,.5);
    margin-bottom: 14px;
  }

  .story-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }

  .story-tag {
    background: rgba(255,255,255,.15);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,.2);
  }

  /* Reply bar */
  .reply-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,.08);
    border: 1.5px solid rgba(255,255,255,.3);
    border-radius: 28px;
    padding: 11px 16px;
    color: rgba(255,255,255,.65);
    font-size: 14px;
    cursor: text;
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
  }

  .reply-actions { display: flex; gap: 16px; font-size: 22px; margin-left: auto; }

  /* Tap zones */
  .tap-left, .tap-right {
    position: absolute;
    top: 0; bottom: 0;
    width: 40%;
    z-index: 12;
    cursor: pointer;
  }

  .tap-left { left: 0; }
  .tap-right { right: 0; }

  /* Swipe indicator */
  .swipe-hint {
    text-align: center;
    color: #444;
    font-size: 12px;
    margin-top: 16px;
  }
</style>
</head>
<body>

<p class="page-label">Pattern 07 — Instagram / Snapchat / WhatsApp Status</p>
<h1 class="page-title">Story Bar Carousel</h1>
<p class="page-sub">Segmented progress · RAF animation · tap zones · hold to pause</p>

<!-- Avatar strip -->
<div class="avatar-strip" id="avatar-strip"></div>

<!-- Story viewer -->
<div class="story-viewer" id="viewer">
  <div class="tap-left" id="tap-left"></div>
  <div class="tap-right" id="tap-right"></div>
  <div class="progress-bars" id="prog-bars"></div>
</div>

<p class="swipe-hint">← Tap left / right to navigate · Hold to pause →</p>

<script>
  const STORIES = [
    { bg: '#1a1a2e', emoji: '🌌', ava: '🌠', user: 'cosmic_vibes', time: '2m ago',
      text: 'The universe is 13.8 billion years old. You exist in the most interesting moment of it all.', tags: ['#space', '#cosmos', '#universe'] },
    { bg: '#0d2137', emoji: '🏄', ava: '🌊', user: 'surf.diaries', time: '8m ago',
      text: 'Dawn patrol at 5am hits different when the swell is 6ft and the lineup is completely empty.', tags: ['#surfing', '#dawn', '#ocean'] },
    { bg: '#1a0d0d', emoji: '🍜', ava: '🍱', user: 'tokyo.bites', time: '15m ago',
      text: 'This ramen shop has had a 3-hour queue every single day since 1978. Worth every minute.', tags: ['#ramen', '#tokyo', '#foodie'] },
    { bg: '#0d1a0d', emoji: '🌿', ava: '☕', user: 'slow.mornings', time: '22m ago',
      text: 'No notifications before 9am. Just coffee, a book, and whatever the light does to the room.', tags: ['#mornings', '#peace', '#slowliving'] },
    { bg: '#2e1a00', emoji: '🎨', ava: '🖌️', user: 'studiofour', time: '1h ago',
      text: 'After 6 months and 212 iterations, the logo is finally right. You\'ll know it when it\'s done.', tags: ['#design', '#branding', '#creative'] },
    { bg: '#001a1a', emoji: '🏔️', ava: '⛰️', user: 'altitude.life', time: '2h ago',
      text: 'Woke up above the clouds today. Some mornings remind you that the world is genuinely magnificent.', tags: ['#mountains', '#travel', '#hiking'] },
  ];

  const DURATION = 5500;
  let cur = 0, raf, startTs, paused = false;
  const viewer = document.getElementById('viewer');
  const progBars = document.getElementById('prog-bars');
  const avatarStrip = document.getElementById('avatar-strip');

  // Build avatar strip
  STORIES.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'story-avatar';
    el.innerHTML = `<div class="avatar-ring ${i === 0 ? 'active' : ''}">
      <div class="avatar-inner">${s.ava}</div>
    </div>
    <span class="avatar-name">${s.user}</span>`;
    el.addEventListener('click', () => jumpTo(i));
    avatarStrip.appendChild(el);
  });

  // Build progress bars
  STORIES.forEach((_, i) => {
    const bg = document.createElement('div');
    bg.className = 'pb-bg';
    bg.innerHTML = `<div class="pb-fill" id="pb${i}"></div>`;
    progBars.appendChild(bg);
  });

  // Build slides
  STORIES.forEach((s, i) => {
    const slide = document.createElement('div');
    slide.className = 'story-slide' + (i === 0 ? ' active' : '');
    slide.innerHTML = `
      <div class="story-bg" style="background:${s.bg}">${s.emoji}</div>
      <div class="story-gradient"></div>
      <div class="story-header">
        <div class="sh-avatar">${s.ava}</div>
        <div>
          <div class="sh-name">${s.user}</div>
          <div class="sh-time">${s.time}</div>
        </div>
        <div class="sh-right">
          <span class="sh-icon">···</span>
          <span class="sh-icon">✕</span>
        </div>
      </div>
      <div class="story-content">
        <p class="story-text">${s.text}</p>
        <div class="story-tags">${s.tags.map(t => `<span class="story-tag">${t}</span>`).join('')}</div>
        <div class="reply-bar">
          <span>Reply to ${s.user}...</span>
          <div class="reply-actions"><span>❤️</span><span>📤</span></div>
        </div>
      </div>`;
    viewer.appendChild(slide);
  });

  function setSlide(n, direction) {
    const slides = viewer.querySelectorAll('.story-slide');
    const rings = avatarStrip.querySelectorAll('.avatar-ring');
    slides[cur].classList.remove('active');
    rings[cur].className = 'avatar-ring viewed';
    cur = (n + STORIES.length) % STORIES.length;
    slides[cur].classList.add('active');
    rings[cur].className = 'avatar-ring active';
    startProgress();
  }

  function jumpTo(n) {
    const slides = viewer.querySelectorAll('.story-slide');
    slides[cur].classList.remove('active');
    cur = n;
    slides[cur].classList.add('active');
    startProgress();
  }

  function startProgress() {
    cancelAnimationFrame(raf);
    startTs = null;
    // Reset all fills
    STORIES.forEach((_, i) => {
      const fill = document.getElementById('pb' + i);
      fill.style.transition = 'none';
      fill.style.width = i < cur ? '100%' : '0%';
    });
    animate(performance.now());
  }

  function animate(ts) {
    if (!startTs) startTs = ts;
    if (!paused) {
      const elapsed = ts - startTs;
      const pct = Math.min(elapsed / DURATION * 100, 100);
      const fill = document.getElementById('pb' + cur);
      fill.style.width = pct + '%';
      if (pct >= 100) {
        if (cur < STORIES.length - 1) setSlide(cur + 1);
        else jumpTo(0);
        return;
      }
    } else {
      startTs = ts - (parseFloat(document.getElementById('pb' + cur).style.width) / 100 * DURATION);
    }
    raf = requestAnimationFrame(animate);
  }

  // Tap zones
  document.getElementById('tap-left').addEventListener('click', () => {
    if (cur > 0) setSlide(cur - 1);
    else startProgress();
  });
  document.getElementById('tap-right').addEventListener('click', () => {
    if (cur < STORIES.length - 1) setSlide(cur + 1);
    else jumpTo(0);
  });

  // Hold to pause
  viewer.addEventListener('mousedown', () => { paused = true; });
  viewer.addEventListener('mouseup', () => { paused = false; });
  viewer.addEventListener('touchstart', () => { paused = true; });
  viewer.addEventListener('touchend', () => { paused = false; });

  // Start
  startProgress();
  raf = requestAnimationFrame(animate);
</script>
</body>
</html>

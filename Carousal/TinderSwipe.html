<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>08 — Tinder Swipe Carousel</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    overflow: hidden;
  }

  /* Header */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 420px;
    margin-bottom: 20px;
  }

  .app-logo {
    font-size: 22px;
    font-weight: 900;
    background: linear-gradient(135deg, #fd297b, #ff655b, #ff8c37);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -.02em;
  }

  .header-icons { display: flex; gap: 18px; }
  .h-icon { font-size: 20px; cursor: pointer; color: #aaa; }
  .h-icon:hover { color: #555; }

  /* Page meta */
  .page-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #bbb;
    margin-bottom: 24px;
    text-align: center;
  }

  /* Card stage */
  .card-stage {
    position: relative;
    width: 340px;
    height: 480px;
    margin-bottom: 20px;
  }

  /* Swipe card */
  .swipe-card {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    overflow: hidden;
    cursor: grab;
    will-change: transform;
    touch-action: none;
    box-shadow: 0 8px 40px rgba(0,0,0,.16), 0 2px 8px rgba(0,0,0,.1);
    transition: box-shadow .3s;
  }

  .swipe-card:active { cursor: grabbing; }

  .card-image {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 120px;
  }

  .card-gradient {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 55%;
    background: linear-gradient(to top, rgba(0,0,0,.85) 0%, rgba(0,0,0,.4) 50%, transparent 100%);
  }

  .card-info {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 24px 24px 20px;
    color: #fff;
  }

  .card-name {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-age {
    font-size: 22px;
    font-weight: 400;
  }

  .card-verified {
    width: 22px;
    height: 22px;
    background: #21b4fd;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }

  .card-sub {
    font-size: 15px;
    color: rgba(255,255,255,.8);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-tags {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
  }

  .card-tag {
    background: rgba(255,255,255,.18);
    border: 1px solid rgba(255,255,255,.25);
    color: #fff;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
  }

  /* Info button */
  .card-info-btn {
    position: absolute;
    bottom: 24px;
    right: 20px;
    width: 36px;
    height: 36px;
    background: rgba(255,255,255,.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    cursor: pointer;
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
    border: 1.5px solid rgba(255,255,255,.3);
    color: #fff;
  }

  /* Overlays */
  .overlay-like {
    position: absolute;
    top: 32px;
    left: 22px;
    background: transparent;
    border: 3px solid #4caf50;
    color: #4caf50;
    font-size: 28px;
    font-weight: 900;
    padding: 6px 16px;
    border-radius: 10px;
    transform: rotate(-20deg);
    opacity: 0;
    transition: opacity .15s;
    z-index: 10;
    letter-spacing: .04em;
    text-shadow: 0 0 12px rgba(76,175,80,.5);
  }

  .overlay-nope {
    position: absolute;
    top: 32px;
    right: 22px;
    border: 3px solid #f44336;
    color: #f44336;
    font-size: 28px;
    font-weight: 900;
    padding: 6px 16px;
    border-radius: 10px;
    transform: rotate(20deg);
    opacity: 0;
    transition: opacity .15s;
    z-index: 10;
    letter-spacing: .04em;
    text-shadow: 0 0 12px rgba(244,67,54,.5);
  }

  .overlay-super {
    position: absolute;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    border: 3px solid #2196f3;
    color: #2196f3;
    font-size: 24px;
    font-weight: 900;
    padding: 6px 20px;
    border-radius: 10px;
    opacity: 0;
    transition: opacity .15s;
    z-index: 10;
    letter-spacing: .04em;
  }

  /* Depth cards */
  .depth-card {
    position: absolute;
    inset: 12px 16px 0;
    border-radius: 20px;
    pointer-events: none;
    background: #ddd;
    transition: transform .4s cubic-bezier(.23,1,.32,1);
  }

  .depth-card-2 {
    inset: 20px 26px 0;
    background: #e5e5e5;
    z-index: -2;
  }

  /* Action buttons */
  .action-bar {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 16px;
  }

  .action-btn {
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 4px 16px rgba(0,0,0,.14);
    background: #fff;
  }

  .action-btn:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(0,0,0,.18); }
  .action-btn:active { transform: scale(0.95); }

  .btn-sm { width: 50px; height: 50px; font-size: 20px; }
  .btn-md { width: 62px; height: 62px; font-size: 26px; }
  .btn-lg { width: 56px; height: 56px; font-size: 22px; }

  /* Bottom nav */
  .bottom-nav {
    display: flex;
    gap: 32px;
    margin-top: 8px;
  }

  .bn-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    color: #bbb;
    font-size: 22px;
    transition: color .2s;
  }

  .bn-item:hover { color: #888; }
  .bn-item.active { color: #fd297b; }
  .bn-label { font-size: 10px; font-weight: 600; }

  /* Match overlay */
  .match-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity .4s;
  }

  .match-overlay.show { opacity: 1; pointer-events: all; }

  .match-title {
    font-size: 42px;
    font-weight: 900;
    background: linear-gradient(135deg, #fd297b, #ff655b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    text-align: center;
  }

  .match-sub { font-size: 16px; color: rgba(255,255,255,.7); margin-bottom: 36px; text-align: center; }

  .match-avatars { display: flex; gap: 20px; margin-bottom: 36px; }

  .match-ava {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid #fd297b;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 50px;
    background: #222;
  }

  .match-btns { display: flex; flex-direction: column; gap: 12px; width: 240px; }

  .match-btn {
    padding: 16px;
    border-radius: 30px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: transform .15s;
  }

  .match-btn:hover { transform: scale(1.03); }
  .match-btn.primary { background: linear-gradient(135deg, #fd297b, #ff655b); color: #fff; }
  .match-btn.secondary { background: transparent; color: #fff; border: 2px solid rgba(255,255,255,.3); }

  .empty-state {
    text-align: center;
    padding: 40px;
  }

  .empty-emoji { font-size: 60px; margin-bottom: 16px; }
  .empty-title { font-size: 22px; font-weight: 700; color: #333; margin-bottom: 8px; }
  .empty-sub { font-size: 14px; color: #999; margin-bottom: 20px; }
  .refresh-btn {
    background: linear-gradient(135deg, #fd297b, #ff655b);
    color: #fff;
    border: none;
    padding: 12px 28px;
    border-radius: 30px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-logo">Tinder</div>
  <div class="header-icons">
    <span class="h-icon">⚡</span>
    <span class="h-icon">🔔</span>
  </div>
</div>

<p class="page-label">Pattern 08 — Tinder / Hinge / Bumble</p>

<!-- Card Stage -->
<div class="card-stage" id="stage">
  <div class="depth-card depth-card-2" id="d2"></div>
  <div class="depth-card" id="d1"></div>
</div>

<!-- Action Bar -->
<div class="action-bar">
  <button class="action-btn btn-sm" id="btn-undo" title="Undo">↩</button>
  <button class="action-btn btn-lg" id="btn-nope" title="Nope">✕</button>
  <button class="action-btn btn-sm" id="btn-super" title="Super Like">★</button>
  <button class="action-btn btn-lg" id="btn-like" title="Like">♥</button>
  <button class="action-btn btn-sm" id="btn-boost" title="Boost">⚡</button>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="bn-item"><span>👤</span><span class="bn-label">Profile</span></div>
  <div class="bn-item active"><span>🔥</span><span class="bn-label">Swipe</span></div>
  <div class="bn-item"><span>💬</span><span class="bn-label">Messages</span></div>
</div>

<!-- Match Overlay -->
<div class="match-overlay" id="match-overlay">
  <div class="match-title">It's a Match!</div>
  <div class="match-sub">You and <span id="match-name">—</span> liked each other</div>
  <div class="match-avatars">
    <div class="match-ava">🧑</div>
    <div class="match-ava" id="match-ava">🌊</div>
  </div>
  <div class="match-btns">
    <button class="match-btn primary" id="send-msg-btn">💬 Send a message</button>
    <button class="match-btn secondary" id="keep-swiping-btn">Keep swiping</button>
  </div>
</div>

<script>
  const PROFILES = [
    { emoji:'🏔️', bg:'linear-gradient(160deg,#c5e3f7,#7ec8f0)', name:'Priya', age:26,
      location:'Mumbai, 3 km away', tags:['🧘 Yoga', '☕ Coffee', '✈️ Travel', '📚 Books'] },
    { emoji:'🎸', bg:'linear-gradient(160deg,#f5d5e8,#e8a0c4)', name:'Riya', age:25,
      location:'Delhi, 5 km away', tags:['🎵 Music', '🎨 Art', '🍕 Food', '🐶 Dogs'] },
    { emoji:'🍕', bg:'linear-gradient(160deg,#fde8c8,#f5c080)', name:'Ananya', age:28,
      location:'Bangalore, 2 km away', tags:['🍳 Cooking', '🏃 Running', '🌿 Nature', '📷 Photos'] },
    { emoji:'🎨', bg:'linear-gradient(160deg,#e8d5f5,#c9a0e8)', name:'Meera', age:24,
      location:'Pune, 8 km away', tags:['🎭 Theatre', '🌸 Flowers', '🍵 Tea', '✏️ Sketch'] },
    { emoji:'🌊', bg:'linear-gradient(160deg,#d4edda,#80d4a0)', name:'Kavya', age:27,
      location:'Chennai, 4 km away', tags:['🏄 Surfing', '🌅 Sunsets', '🧗 Climbing', '🐠 Diving'] },
    { emoji:'⭐', bg:'linear-gradient(160deg,#fff3c8,#f5d060)', name:'Sana', age:23,
      location:'Hyderabad, 6 km away', tags:['💃 Dance', '📖 Poetry', '🌙 Night owl', '🍜 Ramen'] },
  ];

  let stack = [...PROFILES];
  let history = [];
  const stage = document.getElementById('stage');
  const d1 = document.getElementById('d1');
  const d2 = document.getElementById('d2');

  function renderCard(profile, isTop = true) {
    const card = document.createElement('div');
    card.className = 'swipe-card';
    card.innerHTML = `
      <div class="card-image" style="background:${profile.bg}">${profile.emoji}</div>
      <div class="card-gradient"></div>
      <div class="card-info">
        <div class="card-name">${profile.name} <span class="card-age">${profile.age}</span>
          <div class="card-verified">✓</div>
        </div>
        <div class="card-sub">📍 ${profile.location}</div>
        <div class="card-tags">${profile.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
      </div>
      <div class="overlay-like" id="ov-like">LIKE</div>
      <div class="overlay-nope" id="ov-nope">NOPE</div>
      <div class="overlay-super" id="ov-super">SUPER</div>
      <div class="card-info-btn">ℹ</div>`;

    if (isTop) initDrag(card);
    return card;
  }

  function buildStack() {
    // Remove existing top cards
    stage.querySelectorAll('.swipe-card').forEach(c => c.remove());

    if (stack.length === 0) {
      stage.innerHTML = `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
        <div class="empty-state">
          <div class="empty-emoji">🌟</div>
          <div class="empty-title">You're all caught up!</div>
          <div class="empty-sub">Check back later for more profiles</div>
          <button class="refresh-btn" onclick="resetStack()">🔄 Refresh</button>
        </div>
      </div>`;
      d1.style.display = 'none'; d2.style.display = 'none';
      return;
    }

    d1.style.display = 'block'; d2.style.display = 'block';
    if (stack.length >= 2) {
      const card2 = renderCard(stack[stack.length - 2], false);
      card2.style.transform = 'scale(0.94) translateY(16px)';
      card2.style.zIndex = '1';
      card2.style.transition = 'transform .4s cubic-bezier(.23,1,.32,1)';
      stage.appendChild(card2);
    }

    const card1 = renderCard(stack[stack.length - 1], true);
    card1.style.zIndex = '5';
    stage.appendChild(card1);
  }

  function initDrag(card) {
    let startX, startY, isDragging = false, velX = 0, lastX, lastT;

    const onStart = (clientX, clientY) => {
      startX = clientX; startY = clientY; lastX = clientX; lastT = Date.now();
      isDragging = true;
      card.style.transition = 'none';
    };

    const onMove = (clientX) => {
      if (!isDragging) return;
      const now = Date.now();
      velX = (clientX - lastX) / (now - lastT + 1);
      lastX = clientX; lastT = now;

      const dx = clientX - startX;
      const rot = dx * 0.08;
      card.style.transform = `translateX(${dx}px) rotate(${rot}deg)`;

      const likeOv = card.querySelector('#ov-like');
      const nopeOv = card.querySelector('#ov-nope');
      likeOv.style.opacity = dx > 15 ? Math.min(dx / 80, 1) : 0;
      nopeOv.style.opacity = dx < -15 ? Math.min(-dx / 80, 1) : 0;
    };

    const onEnd = (clientX) => {
      if (!isDragging) return;
      isDragging = false;
      const dx = clientX - startX;
      const thrown = Math.abs(velX) > 0.5;

      if (dx > 100 || (thrown && velX > 0)) swipe('like');
      else if (dx < -100 || (thrown && velX < 0)) swipe('nope');
      else {
        card.style.transition = 'transform .4s cubic-bezier(.23,1,.32,1)';
        card.style.transform = '';
        card.querySelector('#ov-like').style.opacity = 0;
        card.querySelector('#ov-nope').style.opacity = 0;
      }
    };

    card.addEventListener('mousedown', e => onStart(e.clientX, e.clientY));
    document.addEventListener('mousemove', e => { if (isDragging) onMove(e.clientX); });
    document.addEventListener('mouseup', e => { if (isDragging) onEnd(e.clientX); });

    card.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY));
    card.addEventListener('touchmove', e => { onMove(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
    card.addEventListener('touchend', e => onEnd(e.changedTouches[0].clientX));
  }

  function swipe(dir) {
    const card = stage.querySelector('.swipe-card:last-child');
    if (!card) return;

    const xOut = dir === 'right' || dir === 'like' ? 700 : dir === 'left' || dir === 'nope' ? -700 : 0;
    const yOut = dir === 'super' ? -700 : 0;
    const rot = dir === 'like' ? 30 : dir === 'nope' ? -30 : 0;

    card.style.transition = 'transform .45s cubic-bezier(.23,1,.32,1), opacity .45s';
    card.style.transform = `translateX(${xOut}px) translateY(${yOut}px) rotate(${rot}deg)`;
    card.style.opacity = '0';

    const swiped = stack.pop();
    history.push({ profile: swiped, dir });

    // Chance of match
    if (dir === 'like' || dir === 'super') {
      const isMatch = Math.random() > 0.6;
      if (isMatch) {
        setTimeout(() => showMatch(swiped), 450);
        return;
      }
    }

    setTimeout(buildStack, 450);
  }

  function showMatch(profile) {
    const overlay = document.getElementById('match-overlay');
    document.getElementById('match-name').textContent = profile.name;
    document.getElementById('match-ava').textContent = profile.emoji;
    overlay.classList.add('show');
    buildStack();
  }

  document.getElementById('keep-swiping-btn').addEventListener('click', () => {
    document.getElementById('match-overlay').classList.remove('show');
  });

  document.getElementById('send-msg-btn').addEventListener('click', () => {
    document.getElementById('match-overlay').classList.remove('show');
  });

  document.getElementById('btn-like').addEventListener('click', () => swipe('like'));
  document.getElementById('btn-nope').addEventListener('click', () => swipe('nope'));
  document.getElementById('btn-super').addEventListener('click', () => swipe('super'));

  document.getElementById('btn-undo').addEventListener('click', () => {
    if (history.length === 0) return;
    const last = history.pop();
    stack.push(last.profile);
    buildStack();
  });

  window.resetStack = () => {
    stack = [...PROFILES];
    history = [];
    buildStack();
  };

  buildStack();
</script>
</body>
</html>

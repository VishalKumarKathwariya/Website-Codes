<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>15 — 3D Rolodex Wheel | Precision Carousel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #0e0e0e;
  --stripe: #ff3c00;
  --n: 8;
  --card-h: 200px;
  --wheel-radius: 280px;
  --tilt-step: 360deg / var(--n);
}

body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fff;
  overflow-x: hidden;
  padding: 1.5rem 0;
}

/* Scanline effect */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.05) 2px, rgba(0,0,0,.05) 4px);
  pointer-events: none;
  z-index: 200;
}

/* Ambient texture */
.bg-texture {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 600px 400px at 50% 50%, rgba(255,60,0,.06) 0%, transparent 70%),
              radial-gradient(ellipse at 10% 90%, rgba(255,60,0,.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* Horizontal guide lines (aesthetic) */
.h-lines {
  position: fixed;
  top: 50%;
  left: 0;
  right: 0;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: var(--card-h);
  pointer-events: none;
  z-index: 2;
}
.h-line {
  width: 100%;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(255,60,0,.3) 30%, rgba(255,60,0,.3) 70%, transparent);
}

/* Watermark number */
.watermark {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 400px;
  color: rgba(255,255,255,.02);
  pointer-events: none;
  z-index: 1;
  line-height: 1;
  letter-spacing: -.05em;
  -webkit-user-select: none;
  user-select: none;
  transition: opacity 0.3s;
}

/* Header */
.header {
  position: relative;
  z-index: 10;
  text-align: center;
  margin-bottom: 2rem;
}
.tag {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--stripe);
  margin-bottom: 8px;
}
h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(52px, 7vw, 96px);
  color: #fff;
  line-height: .9;
  letter-spacing: .02em;
}
h1 span {
  color: transparent;
  -webkit-text-stroke: 1px rgba(255,255,255,.3);
}
.sub {
  font-size: 13px;
  color: #888;
  font-weight: 300;
  letter-spacing: .06em;
  margin-top: 10px;
}

/* 3D SCENE — fully visible with correct perspective */
.scene {
  position: relative;
  z-index: 10;
  width: min(94vw, 1000px);
  height: 620px;
  perspective: 1400px;
  perspective-origin: 50% 50%;
  margin: 1rem auto 2rem;
  overflow: visible;
}

/* Soft edge fade (no clipping) */
.scene::before {
  content: '';
  position: absolute;
  left: -10%;
  right: -10%;
  top: 50%;
  transform: translateY(-50%);
  height: var(--card-h);
  background: linear-gradient(to right, transparent, rgba(255,60,0,.04) 30%, rgba(255,60,0,.04) 70%, transparent);
  pointer-events: none;
  z-index: 20;
}
.scene::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, var(--bg) 0%, transparent 18%, transparent 82%, var(--bg) 100%);
  pointer-events: none;
  z-index: 20;
}

/* Wheel container — centered, preserve 3D */
.wheel {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 0;
  height: 0;
  transform-style: preserve-3d;
  will-change: transform;
}

/* Each item: absolutely positioned, smooth transitions */
.wheel-item {
  position: absolute;
  width: min(86vw, 820px);
  height: var(--card-h);
  left: calc(min(86vw, 820px) / -2);
  top: calc(var(--card-h) / -2);
  transform-style: preserve-3d;
  transition: transform 0.65s cubic-bezier(0.23, 1, 0.32, 1);
  will-change: transform;
}

/* Card design */
.wheel-card {
  width: 100%;
  height: 100%;
  border-radius: 6px;
  overflow: hidden;
  display: flex;
  align-items: center;
  cursor: pointer;
  transition: box-shadow 0.3s, border-color 0.2s;
  backface-visibility: hidden;
  border: 1px solid rgba(255,255,255,.07);
  background: rgba(12,12,16,0.75);
  -webkit-backdrop-filter: blur(2px);
  backdrop-filter: blur(2px);
  position: relative;
}

.wheel-card.is-center {
  border-color: rgba(255,60,0,.5);
  box-shadow: 0 0 60px rgba(255,60,0,.2), inset 0 0 40px rgba(255,60,0,.05);
  background: rgba(16,16,22,0.85);
}

/* Card inner elements */
.wc-index {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 80px;
  line-height: 1;
  padding: 0 32px;
  min-width: 120px;
  text-align: center;
  color: rgba(255,255,255,.12);
  flex-shrink: 0;
  transition: color 0.3s;
}
.wheel-card.is-center .wc-index { color: var(--stripe); }

.wc-divider {
  width: 1px;
  height: 60%;
  background: rgba(255,255,255,.08);
  flex-shrink: 0;
  transition: background 0.3s;
}
.wheel-card.is-center .wc-divider { background: rgba(255,60,0,.4); }

.wc-body {
  padding: 0 40px;
  flex: 1;
  position: relative;
  z-index: 2;
}
.wc-category {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--stripe);
  margin-bottom: 8px;
  opacity: .7;
}
.wheel-card.is-center .wc-category { opacity: 1; }

.wc-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(26px, 3.8vw, 42px);
  color: #fff;
  letter-spacing: .02em;
  line-height: 1;
  margin-bottom: 6px;
}
.wc-sub {
  font-size: 13px;
  color: rgba(255,255,255,.45);
  font-weight: 300;
  letter-spacing: .02em;
}
.wheel-card.is-center .wc-sub { color: rgba(255,255,255,.7); }

.wc-tag {
  position: absolute;
  right: 32px;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px;
  letter-spacing: .15em;
  text-transform: uppercase;
  padding: 6px 14px;
  border: 1px solid rgba(255,255,255,.12);
  color: rgba(255,255,255,.4);
  border-radius: 2px;
  white-space: nowrap;
}
.wheel-card.is-center .wc-tag {
  border-color: rgba(255,60,0,.6);
  color: var(--stripe);
}

.wc-stripe {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--stripe);
  opacity: 0;
  transition: opacity 0.3s;
}
.wheel-card.is-center .wc-stripe { opacity: 1; }

.wc-bg {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.4s;
  z-index: 0;
}
.wheel-card.is-center .wc-bg { opacity: 1; }

/* Controls */
.controls {
  position: relative;
  z-index: 15;
  display: flex;
  align-items: center;
  gap: 32px;
  margin-top: 10px;
}
.ctrl {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: .08em;
  background: transparent;
  border: 1px solid rgba(255,255,255,.15);
  color: #fff;
  padding: 10px 32px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}
.ctrl:hover { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.4); }

.count {
  font-family: 'Bebas Neue', sans-serif;
  text-align: center;
}
.count-big { font-size: 48px; line-height: 1; color: #fff; }
.count-sep { font-size: 16px; color: #444; margin: 0 4px; }
.count-total { font-size: 48px; color: #333; line-height: 1; }

/* Ticker tape */
.ticker {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 36px;
  background: var(--stripe);
  display: flex;
  align-items: center;
  overflow: hidden;
  z-index: 50;
}
.ticker-inner {
  display: flex;
  gap: 0;
  animation: ticker-scroll 28s linear infinite;
  white-space: nowrap;
}
@keyframes ticker-scroll {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}
.ticker-item {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: .15em;
  color: #fff;
  padding: 0 32px;
  opacity: .9;
}
.ticker-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(255,255,255,.7);
  flex-shrink: 0;
  align-self: center;
  margin: 0 8px;
}

/* Responsive adjustments */
@media (max-width: 760px) {
  .scene { height: 560px; }
  .wc-index { font-size: 56px; min-width: 80px; padding: 0 20px; }
  .wc-body { padding: 0 20px; }
  .wc-tag { right: 16px; padding: 4px 10px; font-size: 9px; }
  .ctrl { padding: 8px 24px; font-size: 18px; }
}
@media (max-width: 560px) {
  .wc-title { font-size: 20px; }
  .wc-sub { font-size: 10px; }
}
</style>
</head>
<body>

<div class="bg-texture"></div>
<div class="h-lines"><div class="h-line"></div><div class="h-line"></div></div>
<div class="watermark" id="watermark">01</div>

<div class="header">
  <div class="tag">Design 15 · Dribbble / Behance / Creative Agencies</div>
  <h1>ROLO<span>DEX</span><br>WHEEL</h1>
  <p class="sub">Pure 3D wheel · circular YZ layout · smooth inertia · fully corrected</p>
</div>

<div class="scene">
  <div class="wheel" id="wheel"></div>
</div>

<div class="controls">
  <button class="ctrl" id="prev">↑ PREV</button>
  <div class="count">
    <span class="count-big" id="cnt-cur">01</span>
    <span class="count-sep">/</span>
    <span class="count-total" id="cnt-tot">08</span>
  </div>
  <button class="ctrl" id="next">NEXT ↓</button>
</div>

<div class="ticker">
  <div class="ticker-inner" id="ticker-inner"></div>
</div>

<script>
// ======================= DATA =======================
const ITEMS = [
  { cat:'Branding',    title:'BEYOND IDENTITY',     sub:'Visual systems for next-gen startups',  tag:'Case Study',  bg:'rgba(99,91,255,.05)' },
  { cat:'Product',     title:'MOTION MATTERS',       sub:'Interaction design at human scale',      tag:'Research',    bg:'rgba(255,60,0,.05)' },
  { cat:'Typography',  title:'LETTERS ALIVE',        sub:'Variable fonts in editorial design',     tag:'Experiment',  bg:'rgba(16,185,129,.05)' },
  { cat:'3D Design',   title:'DEPTH OF FIELD',       sub:'WebGL and CSS3D in production',          tag:'Tutorial',    bg:'rgba(245,158,11,.05)' },
  { cat:'UX Writing',  title:'WORDS THAT WORK',      sub:'Content design for complex interfaces',  tag:'Guide',       bg:'rgba(236,72,153,.05)' },
  { cat:'Color',       title:'CHROMATIC LOGIC',      sub:'Systematic color for digital products',  tag:'Framework',   bg:'rgba(0,229,255,.05)' },
  { cat:'Animation',   title:'THE TIMING PRINCIPLE', sub:'Easing, physics, and perceived speed',   tag:'Deep Dive',   bg:'rgba(251,146,60,.05)' },
  { cat:'Systems',     title:'DESIGN TOKENS',        sub:'The atomic structure of design at scale',tag:'Methodology', bg:'rgba(139,92,246,.05)' },
];

const N = ITEMS.length;
const ANGLE_STEP = 360 / N;
const RADIUS = 270;        // perfect fit inside 620px scene (Y range: -270..+270)
const wheelContainer = document.getElementById('wheel');
const cntCurSpan = document.getElementById('cnt-cur');
const cntTotSpan = document.getElementById('cnt-tot');
const watermarkDiv = document.getElementById('watermark');

cntTotSpan.textContent = String(N).padStart(2, '0');

let currentIndex = 0;
let autoInterval = null;

// ---------- Build 3D wheel items (clean) ----------
function buildWheel() {
  wheelContainer.innerHTML = '';
  ITEMS.forEach((item, idx) => {
    const itemDiv = document.createElement('div');
    itemDiv.className = 'wheel-item';
    itemDiv.setAttribute('data-index', idx);
    
    const card = document.createElement('div');
    card.className = 'wheel-card';
    card.setAttribute('data-index', idx);
    card.innerHTML = `
      <div class="wc-stripe"></div>
      <div class="wc-bg" style="background:${item.bg}"></div>
      <div class="wc-index">${String(idx+1).padStart(2,'0')}</div>
      <div class="wc-divider"></div>
      <div class="wc-body">
        <div class="wc-category">${item.cat}</div>
        <div class="wc-title">${item.title}</div>
        <div class="wc-sub">${item.sub}</div>
      </div>
      <div class="wc-tag">${item.tag}</div>
    `;
    
    // Click handler: go to specific index
    card.addEventListener('click', (e) => {
      e.stopPropagation();
      goToIndex(idx);
    });
    
    itemDiv.appendChild(card);
    wheelContainer.appendChild(itemDiv);
  });
}

// Core positioning: each card sits on a perfect circle in Y-Z plane
// All cards face forward (no additional rotation), guaranteeing readability & no "messy" tilt.
// The wheel rotates by updating relative angles based on currentIndex.
function updateWheelPositions() {
  const items = document.querySelectorAll('.wheel-item');
  const baseAngleRad = (currentIndex * ANGLE_STEP) * Math.PI / 180;
  
  items.forEach((item, i) => {
    // Nominal angle for this card (world angle before wheel offset)
    const nominalAngle = (i * ANGLE_STEP) * Math.PI / 180;
    // Relative angle: difference between card's fixed position and current wheel rotation
    let relativeAngle = nominalAngle - baseAngleRad;
    
    // Compute position on YZ circle
    const y = Math.sin(relativeAngle) * RADIUS;
    const z = Math.cos(relativeAngle) * RADIUS;
    
    // Apply transform: move along Y (vertical) and Z (depth). No rotateX = clean, upright cards.
    item.style.transform = `translateY(${y}px) translateZ(${z}px)`;
    
    // Opacity based on distance from center (front-most: cos = 1 → fully opaque)
    const cosVal = Math.cos(relativeAngle);
    let opacity = Math.min(0.98, Math.max(0.35, 0.5 + cosVal * 0.5));
    item.style.opacity = opacity;
    
    // Update "is-center" class: only when i === currentIndex
    const card = item.querySelector('.wheel-card');
    if (i === currentIndex) {
      card.classList.add('is-center');
    } else {
      card.classList.remove('is-center');
    }
  });
  
  // Update UI counters and watermark
  cntCurSpan.textContent = String(currentIndex + 1).padStart(2, '0');
  watermarkDiv.textContent = String(currentIndex + 1).padStart(2, '0');
}

// Navigate to specific index (0..N-1)
function goToIndex(newIndex) {
  // wrap around
  let rawIndex = newIndex % N;
  if (rawIndex < 0) rawIndex += N;
  if (rawIndex === currentIndex) return;
  
  currentIndex = rawIndex;
  updateWheelPositions();
  resetAutoRotate();
}

// next/prev with increment
function nextCard() { goToIndex(currentIndex + 1); }
function prevCard() { goToIndex(currentIndex - 1); }

// Auto rotation (gentle)
function startAutoRotate() {
  if (autoInterval) clearInterval(autoInterval);
  autoInterval = setInterval(() => {
    nextCard();
  }, 3200);
}

function resetAutoRotate() {
  if (autoInterval) clearInterval(autoInterval);
  startAutoRotate();
}

// ---------- Event listeners ----------
document.getElementById('prev').addEventListener('click', () => { prevCard(); });
document.getElementById('next').addEventListener('click', () => { nextCard(); });

// Keyboard controls
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault();
    prevCard();
  } else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    e.preventDefault();
    nextCard();
  }
});

// Mouse wheel: smooth scroll detection
let wheelAccum = 0;
document.addEventListener('wheel', (e) => {
  wheelAccum += e.deltaY;
  if (Math.abs(wheelAccum) > 70) {
    if (wheelAccum > 0) nextCard();
    else prevCard();
    wheelAccum = 0;
    resetAutoRotate();
  }
  e.preventDefault();
}, { passive: false });

// Touch drag (vertical swipe)
let touchStartY = null;
document.addEventListener('touchstart', (e) => {
  touchStartY = e.touches[0].clientY;
  if (autoInterval) clearInterval(autoInterval);
});
document.addEventListener('touchend', (e) => {
  if (touchStartY !== null) {
    const delta = e.changedTouches[0].clientY - touchStartY;
    if (delta < -50) nextCard();
    else if (delta > 50) prevCard();
    touchStartY = null;
    resetAutoRotate();
  }
});

// Mouse drag simulation (desktop drag)
let mouseStartY = null;
document.addEventListener('mousedown', (e) => {
  if (e.button === 0) {
    mouseStartY = e.clientY;
    if (autoInterval) clearInterval(autoInterval);
  }
});
document.addEventListener('mouseup', (e) => {
  if (mouseStartY !== null) {
    const delta = e.clientY - mouseStartY;
    if (delta < -50) nextCard();
    else if (delta > 50) prevCard();
    mouseStartY = null;
    resetAutoRotate();
  }
});

// Build ticker (infinite loop)
function buildTicker() {
  const tickerInner = document.getElementById('ticker-inner');
  tickerInner.innerHTML = '';
  // duplicate items for seamless loop
  const doubled = [...ITEMS, ...ITEMS];
  doubled.forEach((item, idx) => {
    const span = document.createElement('span');
    span.className = 'ticker-item';
    span.textContent = `${item.cat.toUpperCase()} — ${item.title}`;
    tickerInner.appendChild(span);
    const dot = document.createElement('div');
    dot.className = 'ticker-dot';
    tickerInner.appendChild(dot);
  });
}

// ---------- RESIZE HANDLER: ensure full visibility & dynamic radius adjust? ----------
// Keep radius consistent but adapt scene minimal height if needed
function adjustVisibility() {
  const sceneEl = document.querySelector('.scene');
  if (window.innerHeight < 700) {
    sceneEl.style.height = '560px';
  } else {
    sceneEl.style.height = '620px';
  }
  // re-apply transforms so that positions are correctly recalculated (no drift)
  updateWheelPositions();
}

// On window resize ensure no clipping
window.addEventListener('resize', () => {
  adjustVisibility();
  // slight delay to avoid layout thrash
  setTimeout(updateWheelPositions, 60);
});

// ---------- INITIALIZATION ----------
function init() {
  buildWheel();
  adjustVisibility();
  updateWheelPositions();   // correct positions from start (center card at front)
  startAutoRotate();
  buildTicker();
}

// Extra safety: after fonts load or images, reposition once
window.addEventListener('load', () => {
  updateWheelPositions();
  // additional minor fix for ios safari
  setTimeout(updateWheelPositions, 100);
});

init();
</script>
</body>
</html>
